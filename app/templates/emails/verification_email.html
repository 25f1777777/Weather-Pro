<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
</head>

<body
    style="
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        padding:40px;
    "
>

    <div
        style="
            max-width:600px;
            margin:auto;
            background:white;
            padding:40px;
            border-radius:12px;
        "
    >

        <h2>
            Welcome to WeatherPro ☁️
        </h2>

        <p>

            Thank you for registering.

        </p>

        <p>

            Please verify your email address to activate your account.

        </p>

        <a
            href="{{ activation_link }}"
            style="
                display:inline-block;
                margin-top:15px;
                background:#0d6efd;
                color:white;
                padding:12px 24px;
                text-decoration:none;
                border-radius:8px;
            "
        >

            Verify Email

        </a>

        <p style="margin-top:25px;">

            If you didn't create this account,
            simply ignore this email.

        </p>

    </div>

</body>

</html>
