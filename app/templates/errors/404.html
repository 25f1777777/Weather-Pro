{% extends "base.html" %}

{% block title %}
404 | Page Not Found
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="glass-card text-center p-5">

                <h1 class="display-1 fw-bold">

                    404

                </h1>

                <h3 class="mb-3">

                    Page Not Found

                </h3>

                <p class="mb-4">

                    The page you are looking for
                    doesn't exist or has been moved.

                </p>

                <a
                    href="{{ url_for('weather.dashboard') }}"
                    class="btn btn-primary">

                    <i class="fas fa-home"></i>

                    Back To Dashboard

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
